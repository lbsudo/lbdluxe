<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LBDLUXE</title>

    <!-- Critical pre-CSS styles to prevent ALL flashes -->
    <style>
      body {
        margin: 0;
      }

      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: black;
        visibility: hidden; /* prevent first-frame snapping */
      }

      /* Spinner (pre-Tailwind safe) */
      .splash-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: white;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }

      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body class="bg-background text-foreground">
    <!-- Splash Screen -->
    <div id="splash-screen">
      <!-- Locked-size container prevents layout shift -->
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 160px;
          height: 200px;
        "
      >
        <!-- Logo -->
        <img
          src="/favicon.svg"
          alt="Loading"
          width="80"
          height="80"
          style="width: 200px; height: 200px"
          class="animate-pulse drop-shadow-xl"
        />

        <!-- Spinner -->
        <div style="margin-top: 16px">
          <div class="splash-spinner"></div>
        </div>
      </div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
