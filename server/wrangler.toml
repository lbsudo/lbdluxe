name = "lbdluxe-api"
main = "src/index.ts"
compatibility_date = "2024-12-10"

# Disable workers.dev subdomain (since you're using custom domain)
workers_dev = false

# Enable preview URLs for testing (optional)
preview_urls = true

# Custom domain route
routes = [
    { pattern = "api.lbdluxe.com", custom_domain = true }
]

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[build]
command = "bun run build"

# Environment variables (non-sensitive)
[vars]
ENVIRONMENT = "production"
RESEND_API_KEY="re_gFJJZkDG_HDfX8FpX8rWkrK5q5icJxKgt"
RESEND_AUDIENCE_ID = "ce05c2d0-c68b-411f-b28c-54316f486d35"

# Secrets (add via CLI):
# npx wrangler secret put RESEND_API_KEY
# npx wrangler secret put SUPABASE_URL
# npx wrangler secret put SUPABASE_ANON_KEY

# KV Namespaces (if needed)
# [[kv_namespaces]]
# binding = "MY_KV"
# id = "your-kv-id"

# D1 Databases (if needed)
# [[d1_databases]]
# binding = "DB"
# database_name = "my-database"
# database_id = "your-database-id"