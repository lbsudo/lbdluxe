name = "lbdluxe-api"
main = "src/index.ts"
compatibility_date = "2024-12-10"

# Disable workers.dev subdomain (since you're using custom domain)
workers_dev = false

# Enable preview URLs for testing (optional)
preview_urls = true

# Custom domain route
routes = [
    { pattern = "api.lbdluxe.com", custom_domain = true }
]

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[build]
command = "bun run build"

# Environment variables
[vars]
# Add your environment variables here
# EXAMPLE_VAR = "value"

# KV Namespaces (if needed)
# [[kv_namespaces]]
# binding = "MY_KV"
# id = "your-kv-id"

# D1 Databases (if needed)
# [[d1_databases]]
# binding = "DB"
# database_name = "my-database"
# database_id = "your-database-id"